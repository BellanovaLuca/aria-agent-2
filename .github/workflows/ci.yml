name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Installa le dipendenze dei servizi
        run: |
          python -m pip install --upgrade pip
          for svc in user_service email_service knowledge_service chat_service ticket_service analytics_service; do
            pip install -r "services/$svc/requirements.txt"
          done
          pip install pytest pytest-asyncio
      - name: Esegui i test (offline: embedding fake, Qdrant in-memory, LLM mock)
        run: |
          for svc in knowledge_service user_service chat_service ticket_service analytics_service; do
            echo "== $svc =="
            (cd "services/$svc" && python -m pytest tests/ -q)
          done

  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
